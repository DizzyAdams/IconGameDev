name: Build Marketplace Packs

on:
  push:
    branches: [main]
    paths:
      - 'marketplace-content/**'
  workflow_dispatch:

jobs:
  build-packs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace-content
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python deps
        run: pip install pillow
      - name: Install Node deps
        run: npm ci
      - name: Generate textures
        run: |
          python scripts/generate-skin-textures.py
          python scripts/generate-texture-pack.py
      - name: Build all .mcpacks
        run: python scripts/build-all.py
      - uses: actions/upload-artifact@v4
        with:
          name: mcpacks
          path: marketplace-content/dist/*.mcpack
