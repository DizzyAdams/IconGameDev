name: Deploy Website (Vercel)

# Deploys the Next.js app in `website-next/` to Vercel. The project is already
# linked (.vercel/project.json) and vercel.json carries domains/redirects/headers.
# Vercel auto-deploys on push to the linked GitHub repo; this workflow is the
# explicit, secrets-driven path (e.g. manual dispatch or CI on the website repo).

on:
  push:
    branches: [master]
    paths:
      - 'website-next/**'
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website-next/package-lock.json

      - name: Install dependencies
        working-directory: website-next
        run: npm ci

      - name: Pull Vercel project settings
        working-directory: website-next
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        working-directory: website-next
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        working-directory: website-next
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
