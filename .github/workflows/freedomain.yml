name: FreeDomain claim

on:
  workflow_dispatch:
  schedule:
    # Monthly, 1st of month at 06:00 UTC
    - cron: '0 6 1 * *'

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Claim FreeDomain (best-effort)
        env:
          DP_EMAIL: ${{ secrets.DP_EMAIL }}
          DP_PASS: ${{ secrets.DP_PASS }}
        run: python domains/freedomain_claim.py --claim
