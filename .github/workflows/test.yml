name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bedrock-economy-rpg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Install deps
        run: uv sync
      - name: Run tests
        run: uv run pytest tests/ -v
      - name: Check syntax
        run: python -m py_compile src/**/*.py
