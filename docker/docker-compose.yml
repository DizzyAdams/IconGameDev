version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minecraft
      POSTGRES_USER: mcuser
      POSTGRES_PASSWORD: mcpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../bedrock-economy-rpg/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcuser -d minecraft"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bedrock

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bedrock

  bds:
    image: endstone/endstone:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mcuser:mcpass@postgres:5432/minecraft
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_NAME: "Bedrock Minemods"
      SERVER_PORT: 19132
      LEVEL_NAME: "BedrockWorld"
      GAMEMODE: survival
      DIFFICULTY: normal
      MAX_PLAYERS: 50
      ONLINE_MODE: "true"
      ALLOW_OUTBOUND_SCRIPT_DEBUGGING: "true"
    volumes:
      - bds-data:/bedrock/data
      - ../bedrock-economy-rpg:/plugins/bedrock-economy-rpg
    ports:
      - "19132:19132/udp"
      - "19133:19133/udp"
    networks:
      - bedrock

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - bedrock

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - bedrock

volumes:
  pgdata:
  redisdata:
  bds-data:
  prometheus-data:
  grafana-data:

networks:
  bedrock:
    driver: bridge
